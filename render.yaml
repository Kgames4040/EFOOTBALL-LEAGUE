# Render Blueprint — Premier Ligi Kupa (eFootball Lig)
# Render Dashboard > New > Blueprint ile bu dosyayı kullanarak iki servisi birden kurabilirsiniz.
# MongoDB için MongoDB Atlas (ücretsiz M0) kullanın ve MONGO_URL'i Atlas connection string ile doldurun.

services:
  # ---------------- Backend (FastAPI) ----------------
  - type: web
    name: premier-ligi-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MONGO_URL
        sync: false   # Atlas connection string (mongodb+srv://...)
      - key: DB_NAME
        value: premier_ligi
      - key: CORS_ORIGINS
        sync: false   # Frontend URL'iniz, örn: https://premier-ligi-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: neco
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@efootball-league.app

  # ---------------- Frontend (React static site) ----------------
  - type: web
    name: premier-ligi-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false   # Backend URL'iniz, örn: https://premier-ligi-backend.onrender.com
      - key: WDS_SOCKET_PORT
        value: "443"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
