<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>My Bets - eFootball Pro League</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Sora:wght@700;800&amp;family=JetBrains+Mono:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#111417",
                        "on-tertiary-container": "#5a5f67",
                        "on-tertiary": "#2c3138",
                        "tertiary-fixed-dim": "#c2c7d0",
                        "inverse-primary": "#006a66",
                        "inverse-on-surface": "#2e3134",
                        "tertiary": "#f2f5ff",
                        "surface-container-lowest": "#0b0e11",
                        "surface-container-highest": "#323538",
                        "primary-container": "#00f2ea",
                        "tertiary-fixed": "#dee2ec",
                        "on-primary": "#003735",
                        "surface": "#111417",
                        "on-primary-fixed-variant": "#00504d",
                        "primary": "#cffffb",
                        "on-surface": "#e1e2e7",
                        "on-background": "#e1e2e7",
                        "outline-variant": "#3a4a48",
                        "surface-container": "#1d2023",
                        "on-secondary-fixed-variant": "#3c4d00",
                        "on-tertiary-fixed-variant": "#42474f",
                        "on-secondary": "#283500",
                        "on-error": "#690005",
                        "secondary-container": "#c3f400",
                        "surface-dim": "#111417",
                        "secondary-fixed-dim": "#abd600",
                        "secondary": "#ffffff",
                        "surface-variant": "#323538",
                        "on-surface-variant": "#b9cac8",
                        "surface-tint": "#00ddd6",
                        "primary-fixed-dim": "#00ddd6",
                        "on-secondary-fixed": "#161e00",
                        "on-primary-container": "#006a66",
                        "surface-bright": "#37393d",
                        "surface-container-high": "#272a2e",
                        "tertiary-container": "#d5d9e3",
                        "surface-container-low": "#191c1f",
                        "outline": "#849492",
                        "on-secondary-container": "#556d00",
                        "secondary-fixed": "#c3f400",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed": "#171c23",
                        "error": "#ffb4ab",
                        "on-primary-fixed": "#00201e",
                        "primary-fixed": "#29fcf3",
                        "inverse-surface": "#e1e2e7",
                        "success": "#10b981",
                        "warning": "#f59e0b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "container-max": "1280px",
                        "xs": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "xl": "40px",
                        "base": "4px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "display-lg": ["Sora"],
                        "odds-num": ["JetBrains Mono"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Sora"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Sora"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "odds-num": ["16px", {"lineHeight": "16px", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(29, 32, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(58, 74, 72, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-md h-16 bg-surface border-b border-outline-variant flat no shadows">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface">eFootball Pro League</h1>
</div>
<div class="flex items-center">
<span class="font-odds-num text-odds-num text-primary-fixed-dim">$2,450.00</span>
</div>
</header>
<!-- Main Canvas -->
<main class="pt-20 px-md max-w-container-max mx-auto">
<!-- Tab Switcher -->
<div class="flex bg-surface-container-high rounded-lg p-1 mb-lg">
<button class="flex-1 py-2 text-center rounded-md bg-secondary-container text-on-secondary-container font-label-sm text-label-sm font-bold shadow-sm transition-all duration-200">
                Aktif Kuponlar
            </button>
<button class="flex-1 py-2 text-center rounded-md text-on-surface-variant hover:text-on-surface font-label-sm text-label-sm transition-all duration-200">
                Geçmiş Kuponlar
            </button>
</div>
<!-- Bets List Container -->
<div class="flex flex-col gap-md">
<!-- Active Bet Card 1 -->
<article class="glass-panel rounded-xl overflow-hidden shadow-lg border border-outline-variant">
<!-- Card Header -->
<div class="bg-surface-container-high px-md py-sm border-b border-outline-variant flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline text-[18px]">receipt</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">#82169-BT</span>
</div>
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm text-on-surface-variant">Bugün 23:00</span>
<div class="px-2 py-1 bg-warning/20 border border-warning/50 rounded text-warning font-label-sm text-[10px] uppercase tracking-wider flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-warning animate-pulse"></span>
                            Beklemede
                        </div>
</div>
</div>
<!-- Match List -->
<div class="p-md flex flex-col gap-sm border-b border-outline-variant/50">
<!-- Match 1 -->
<div class="flex items-center justify-between p-sm bg-surface-container-low rounded-lg border border-surface-container-highest">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-on-surface text-[16px]">sports_soccer</span>
</div>
<div>
<h4 class="font-label-sm text-label-sm text-on-surface">Dijon - PSG</h4>
<p class="font-label-sm text-[10px] text-primary-fixed-dim">Toplam Gol 3.5 Üst</p>
</div>
</div>
<div class="text-right">
<div class="font-odds-num text-odds-num text-primary">1.85</div>
<div class="font-label-sm text-[10px] text-on-surface-variant">0 - 0 (Dk 12)</div>
</div>
</div>
<!-- Match 2 -->
<div class="flex items-center justify-between p-sm bg-surface-container-low rounded-lg border border-surface-container-highest">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-on-surface text-[16px]">sports_soccer</span>
</div>
<div>
<h4 class="font-label-sm text-label-sm text-on-surface">Real Oviedo - Almeira</h4>
<p class="font-label-sm text-[10px] text-primary-fixed-dim">Maç Sonucu 1</p>
</div>
</div>
<div class="text-right">
<div class="font-odds-num text-odds-num text-primary">2.10</div>
<div class="font-label-sm text-[10px] text-on-surface-variant">Başlamadı</div>
</div>
</div>
</div>
<!-- Card Footer (Summary) -->
<div class="p-md bg-surface-container flex justify-between items-center">
<div class="flex flex-col">
<span class="font-label-sm text-[10px] text-on-surface-variant">Toplam Oran</span>
<span class="font-odds-num text-body-md text-on-surface">3.88</span>
</div>
<div class="flex flex-col items-center">
<span class="font-label-sm text-[10px] text-on-surface-variant">Miktar</span>
<span class="font-odds-num text-body-md text-on-surface">100.00 TL</span>
</div>
<div class="flex flex-col items-end">
<span class="font-label-sm text-[10px] text-primary-fixed-dim">Potansiyel Kazanç</span>
<span class="font-odds-num text-headline-md text-primary">388.50 TL</span>
</div>
</div>
</article>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-xs pb-safe h-20 bg-surface-container border-t border-outline-variant shadow-lg dark:shadow-none docked full-width bottom-0 rounded-t-xl">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors">
<span class="material-symbols-outlined">emoji_events</span>
<span class="font-label-sm text-label-sm mt-1">Leagues</span>
</button>
<!-- Active Tab -->
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-label-sm text-label-sm mt-1">My Bets</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors">
<span class="material-symbols-outlined">sensors</span>
<span class="font-label-sm text-label-sm mt-1">Live</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors">
<span class="material-symbols-outlined">menu</span>
<span class="font-label-sm text-label-sm mt-1">Menu</span>
</button>
</nav>
</body></html>
